<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JamgaVOCA - Admin</title>
  <style>
    :root {
      --bg:#0b0f19; --muted:#9fb0cc; --text:#e8eefc;
      --line:rgba(255,255,255,0.08); --radius:14px;
      --blue:rgba(120,160,255,.55); --blue-dim:rgba(120,160,255,.16);
      --green:rgba(80,200,120,.55); --green-dim:rgba(80,200,120,.14);
      --red:rgba(255,100,100,.55);  --red-dim:rgba(255,100,100,.14);
      --yellow:rgba(255,200,80,.55);--yellow-dim:rgba(255,200,80,.12);
    }
    *{box-sizing:border-box;}
    html,body{margin:0;height:100%;}
    body{
      background:
        radial-gradient(1200px 600px at 20% 0%,rgba(92,140,255,.1),transparent 60%),
        radial-gradient(1200px 600px at 80% 10%,rgba(255,92,140,.08),transparent 55%),
        var(--bg);
      background-attachment:fixed;
      color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
      font-size:14px;
    }

    /* Topbar */
    .topbar{
      position:sticky;top:0;z-index:200;
      background:rgba(11,15,25,.95);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--line);
      padding:10px 20px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .topbar h1{margin:0;font-size:17px;}
    .nav-links{display:flex;gap:8px;}
    .nav-link{font-size:12px;color:var(--muted);text-decoration:none;padding:4px 10px;border-radius:999px;border:1px solid var(--line);}
    .nav-link:hover{color:var(--text);}
    .admin-key-row{display:flex;align-items:center;gap:8px;}
    .admin-key-row label{font-size:11px;color:var(--muted);white-space:nowrap;}
    .admin-key-row input{
      padding:5px 10px;border-radius:8px;border:1px solid var(--line);
      background:rgba(0,0,0,.3);color:var(--text);font-size:12px;width:200px;outline:none;
    }
    .admin-key-row input:focus{border-color:rgba(120,160,255,.6);}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}
    .dot.on{background:var(--green);}
    .key-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}

    /* Layout */
    .wrap{width:min(1160px,96vw);margin:20px auto 60px;}

    /* Tabs */
    .tabs{display:flex;gap:4px;margin-bottom:0;border-bottom:1px solid var(--line);}
    .tab{
      padding:8px 20px;cursor:pointer;border-radius:10px 10px 0 0;
      font-size:13px;font-weight:500;color:var(--muted);
      border:1px solid transparent;border-bottom:none;background:transparent;
    }
    .tab.active{color:var(--text);background:rgba(18,26,42,.92);border-color:var(--line);}
    .tab-panel{display:none;padding-top:14px;}
    .tab-panel.active{display:block;}

    /* Card */
    .card{background:rgba(18,26,42,.92);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;}
    .card-title{margin:0 0 12px;font-size:14px;font-weight:600;color:#cfe0ff;}

    /* Buttons */
    .btn{border-radius:8px;border:1px solid var(--line);padding:7px 14px;background:rgba(0,0,0,.18);color:var(--text);cursor:pointer;font-size:12px;}
    .btn.primary{background:var(--blue-dim);border-color:var(--blue);}
    .btn.success{background:var(--green-dim);border-color:var(--green);}
    .btn.danger{background:var(--red-dim);border-color:var(--red);color:#ffaaaa;}
    .btn.warn{background:var(--yellow-dim);border-color:var(--yellow);color:#ffe08a;}
    .btn:hover{filter:brightness(1.1);}
    .btn:disabled{opacity:.4;cursor:not-allowed;}
    .btn-sm{padding:4px 10px;font-size:11px;border-radius:6px;}

    /* Inputs */
    input,select,textarea{
      width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--line);
      background:rgba(0,0,0,.22);color:var(--text);outline:none;font-size:13px;
    }
    input:focus,select:focus,textarea:focus{border-color:rgba(120,160,255,.65);box-shadow:0 0 0 3px rgba(120,160,255,.12);}
    input:disabled{opacity:.5;}
    .field{display:flex;flex-direction:column;gap:5px;}
    .label{font-size:11px;color:var(--muted);}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
    @media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr;}}

    /* Row */
    .row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;}

    /* Table */
    .tbl-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);color:var(--muted);font-weight:500;white-space:nowrap;}
    td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
    tr:hover td{background:rgba(120,160,255,.04);}
    .mono{font-family:ui-monospace,monospace;}
    .dim{color:var(--muted);}
    .pill-sm{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px;border:1px solid var(--line);color:var(--muted);background:rgba(0,0,0,.2);}
    .pill-sm.blue{border-color:var(--blue);color:#aac8ff;background:var(--blue-dim);}
    .pill-sm.green{border-color:var(--green);color:#90efb0;background:var(--green-dim);}

    /* Status */
    .status{padding:8px 12px;border-radius:8px;font-size:12px;margin:8px 0;display:none;}
    .status.ok{background:var(--green-dim);border:1px solid var(--green);color:#90efb0;display:block;}
    .status.err{background:var(--red-dim);border:1px solid var(--red);color:#ffaaaa;display:block;}
    .status.info{background:var(--blue-dim);border:1px solid var(--blue);color:#aac8ff;display:block;}

    /* Modal */
    .modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
    .modal-bg.open{display:flex;}
    .modal{background:#111827;border:1px solid var(--line);border-radius:16px;padding:22px 24px;width:min(600px,94vw);max-height:90vh;overflow-y:auto;}
    .modal-title{font-size:15px;font-weight:600;margin:0 0 16px;color:#cfe0ff;}
    .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

    /* Image picker */
    .img-options{display:flex;gap:14px;margin:12px 0;flex-wrap:wrap;}
    .img-option{
      border:2px solid var(--line);border-radius:10px;padding:6px;cursor:pointer;
      background:rgba(0,0,0,.2);transition:border-color .15s;
    }
    .img-option:hover{border-color:rgba(120,160,255,.4);}
    .img-option.selected{border-color:var(--blue);box-shadow:0 0 0 3px rgba(120,160,255,.2);}
    .img-option img{width:160px;height:160px;object-fit:contain;display:block;border-radius:6px;}
    .img-option .img-label{text-align:center;font-size:11px;color:var(--muted);margin-top:4px;}

    /* Skill image in table */
    .skill-thumb{width:48px;height:48px;object-fit:contain;border-radius:6px;background:rgba(0,0,0,.3);}
    .skill-thumb-none{width:48px;height:48px;border-radius:6px;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);}

    /* Empty */
    .empty{color:var(--muted);font-size:13px;padding:20px;text-align:center;}
  </style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:14px;">
    <h1>Admin Panel</h1>
    <div class="nav-links">
      <a class="nav-link" href="/test-dashboard.html">Test Dashboard</a>
      <a class="nav-link" href="/translation.html">번역 평가</a>
    </div>
  </div>
  <div class="admin-key-row">
    <label for="adminKeyInput">Admin Key</label>
    <input id="adminKeyInput" type="password" placeholder="어드민 키 입력" oninput="onKeyInput()" />
    <div class="key-status">
      <div class="dot" id="keyDot"></div>
      <span id="keyTxt">미입력</span>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('words')">단어 관리</button>
    <button class="tab" onclick="switchTab('skills')">스킬 관리</button>
    <button class="tab" onclick="switchTab('users')">유저 관리</button>
  </div>

  <!-- ── Words Tab ─────────────────────────────────────────── -->
  <div class="tab-panel active" id="tab-words">
    <div class="card">
      <div class="row">
        <div class="field" style="flex:1;min-width:140px;">
          <span class="label">단어 검색</span>
          <input id="wSearch" placeholder="영어 단어 검색..." onkeydown="if(event.key==='Enter')loadWords()" />
        </div>
        <div class="field" style="width:150px;">
          <span class="label">레벨 필터</span>
          <select id="wLevel">
            <option value="">전체</option>
            <option value="BEGINNER">BEGINNER</option>
            <option value="INTERMEDIATE">INTERMEDIATE</option>
            <option value="ADVANCED">ADVANCED</option>
          </select>
        </div>
        <button class="btn primary" onclick="loadWords()">조회</button>
        <button class="btn success" onclick="openWordModal()">+ 단어 추가</button>
      </div>
      <div class="status" id="wStatus"></div>
    </div>
    <div class="card">
      <div class="tbl-wrap" id="wTableWrap"><div class="empty">조회 버튼을 눌러주세요.</div></div>
    </div>
  </div>

  <!-- ── Skills Tab ────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-skills">
    <div class="card">
      <div class="row">
        <div class="field" style="width:180px;">
          <span class="label">Word ID (비우면 전체)</span>
          <input id="sWordId" type="number" placeholder="Word ID" onkeydown="if(event.key==='Enter')loadSkills()" />
        </div>
        <button class="btn primary" onclick="loadSkills()">조회</button>
      </div>
      <div class="status" id="sStatus"></div>
    </div>
    <div class="card">
      <div class="tbl-wrap" id="sTableWrap"><div class="empty">조회 버튼을 눌러주세요.</div></div>
    </div>
  </div>

  <!-- ── Users Tab ─────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-users">
    <div class="card">
      <div class="row">
        <button class="btn primary" onclick="loadUsers()">유저 목록 조회</button>
      </div>
      <div class="status" id="uStatus"></div>
    </div>
    <div class="card">
      <div class="tbl-wrap" id="uTableWrap"><div class="empty">조회 버튼을 눌러주세요.</div></div>
    </div>
  </div>

</div>

<!-- ── Word Modal ───────────────────────────────────────────── -->
<div class="modal-bg" id="wordModal">
  <div class="modal">
    <div class="modal-title" id="wordModalTitle">단어 추가</div>
    <input type="hidden" id="wEditId" />
    <div class="grid2" style="margin-bottom:10px;">
      <div class="field"><span class="label">영어 단어 *</span><input id="wEnglish" placeholder="예: brave" /></div>
      <div class="field"><span class="label">한국어 뜻 *</span><input id="wKorean" placeholder="예: 용감한" /></div>
    </div>
    <div class="grid2" style="margin-bottom:10px;">
      <div class="field">
        <span class="label">품사 *</span>
        <select id="wPos">
          <option value="NOUN">NOUN (명사)</option>
          <option value="VERB">VERB (동사)</option>
          <option value="ADJECTIVE">ADJECTIVE (형용사)</option>
          <option value="ADVERB">ADVERB (부사)</option>
        </select>
      </div>
      <div class="field">
        <span class="label">레벨 *</span>
        <select id="wLevelInput">
          <option value="BEGINNER">BEGINNER</option>
          <option value="INTERMEDIATE">INTERMEDIATE</option>
          <option value="ADVANCED">ADVANCED</option>
        </select>
      </div>
    </div>
    <div class="field" style="margin-bottom:10px;"><span class="label">예문 (영어)</span><input id="wExEn" placeholder="예: She was brave enough to speak up." /></div>
    <div class="field" style="margin-bottom:10px;"><span class="label">예문 (한국어)</span><input id="wExKr" placeholder="예: 그녀는 말할 용기가 있었다." /></div>
    <div class="status" id="wordModalStatus"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeWordModal()">취소</button>
      <button class="btn success" onclick="saveWord()">저장</button>
    </div>
  </div>
</div>

<!-- ── Skill Modal ──────────────────────────────────────────── -->
<div class="modal-bg" id="skillModal">
  <div class="modal">
    <div class="modal-title">스킬 수정</div>
    <input type="hidden" id="sEditId" />

    <!-- Current image -->
    <div style="margin-bottom:14px;">
      <div class="label" style="margin-bottom:6px;">현재 이미지</div>
      <div style="display:flex;align-items:center;gap:12px;">
        <img id="sCurrentImg" style="width:80px;height:80px;object-fit:contain;border-radius:8px;background:rgba(0,0,0,.3);" />
        <button class="btn warn" id="btnPreviewImages" onclick="startImageRegen()">이미지 재생성 (2장 생성 후 선택)</button>
      </div>
    </div>

    <!-- Image picker (hidden until generation) -->
    <div id="imagePickerSection" style="display:none;margin-bottom:14px;">
      <div class="label" style="margin-bottom:6px;">이미지 선택 <span id="imgGenStatus" style="color:#aac8ff;"></span></div>
      <div class="img-options" id="imgOptions"></div>
      <button class="btn success" id="btnConfirmImg" style="display:none;" onclick="confirmImageSelection()">선택한 이미지로 저장</button>
    </div>

    <div class="grid2" style="margin-bottom:10px;">
      <div class="field"><span class="label">스킬 이름</span><input id="sName" /></div>
      <div class="field"><span class="label">데미지</span><input id="sDamage" type="number" /></div>
    </div>
    <div class="field" style="margin-bottom:10px;"><span class="label">설명</span><textarea id="sExplanation" rows="3"></textarea></div>
    <div class="grid2" style="margin-bottom:10px;">
      <div class="field">
        <span class="label">스킬 타입</span>
        <select id="sType">
          <option value="ATTACK">ATTACK</option>
          <option value="DEFEND">DEFEND</option>
          <option value="DAMAGE_BUFF">DAMAGE_BUFF</option>
          <option value="PARALYZE">PARALYZE</option>
          <option value="POISON">POISON</option>
          <option value="CLEANSE">CLEANSE</option>
        </select>
      </div>
      <div class="field"><span class="label">지속 턴 (없으면 비움)</span><input id="sLasting" type="number" /></div>
    </div>
    <div class="status" id="skillModalStatus"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeSkillModal()">취소</button>
      <button class="btn success" onclick="saveSkill()">저장</button>
    </div>
  </div>
</div>

<!-- ── User Modal ───────────────────────────────────────────── -->
<div class="modal-bg" id="userModal">
  <div class="modal">
    <div class="modal-title">유저 수정</div>
    <input type="hidden" id="uEditId" />
    <div class="field" style="margin-bottom:10px;"><span class="label">이메일 (수정 불가)</span><input id="uEmail" disabled /></div>
    <div class="field" style="margin-bottom:10px;"><span class="label">닉네임</span><input id="uNickname" /></div>
    <div class="field" style="margin-bottom:10px;"><span class="label">EXP 포인트</span><input id="uExpPoint" type="number" /></div>
    <div class="status" id="userModalStatus"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeUserModal()">취소</button>
      <button class="btn success" onclick="saveUser()">저장</button>
    </div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const TOKEN_KEY = 'jv_access_token';
  const getToken = () => localStorage.getItem(TOKEN_KEY);
  const getAdminKey = () => $('adminKeyInput').value.trim();

  function onKeyInput() {
    const has = !!getAdminKey();
    $('keyDot').classList.toggle('on', has);
    $('keyTxt').textContent = has ? '입력됨' : '미입력';
  }

  function showStatus(id, type, msg) { const el=$(id); el.className='status '+type; el.textContent=msg; }
  function hideStatus(id) { $(id).className='status'; $(id).textContent=''; }

  async function api(method, path, body) {
    const token = getToken();
    const adminKey = getAdminKey();
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    if (adminKey) headers['X-Admin-Key'] = adminKey;
    const res = await fetch(path, {
      method,
      headers,
      body: body != null ? JSON.stringify(body) : undefined,
    });
    const text = await res.text();
    let data = null;
    try { data = JSON.parse(text); } catch {}
    if (!res.ok) throw Object.assign(new Error(data?.message ?? `HTTP ${res.status}`), { raw: text });
    return data;
  }

  const tabLoaded = { words: false, skills: false, users: false };

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['words','skills','users'][i] === name);
    });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    $('tab-' + name).classList.add('active');
  }

  // ── Words ──────────────────────────────────────────────────
  let wordCache = [];

  async function loadWords() {
    hideStatus('wStatus');
    const search = $('wSearch').value.trim();
    const level = $('wLevel').value;
    let url = '/api/v1/admin/words';
    const p = [];
    if (search) p.push('search=' + encodeURIComponent(search));
    if (level)  p.push('level=' + level);
    if (p.length) url += '?' + p.join('&');
    showStatus('wStatus', 'info', '불러오는 중...');
    try {
      const data = await api('GET', url);
      wordCache = data?.data ?? [];
      renderWordTable(wordCache);
      showStatus('wStatus', 'ok', `${wordCache.length}개 단어`);
    } catch (e) { showStatus('wStatus', 'err', e.message); }
  }

  function renderWordTable(words) {
    if (!words.length) { $('wTableWrap').innerHTML = '<div class="empty">단어가 없습니다.</div>'; return; }
    const rows = words.map(w => `
      <tr>
        <td class="mono dim">${w.id}</td>
        <td style="font-weight:600;color:#e0f0ff;">${w.englishWord}</td>
        <td>${w.koreanMeaning}</td>
        <td><span class="pill-sm">${w.partOfSpeech}</span></td>
        <td><span class="pill-sm blue">${w.wordLevel}</span></td>
        <td class="dim">${w.skillCount}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:11px;">${w.exampleEn || '-'}</td>
        <td>
          <div style="display:flex;gap:4px;">
            <button class="btn btn-sm warn" onclick="openWordModal(${w.id})">수정</button>
            <button class="btn btn-sm danger" onclick="deleteWord(${w.id},'${escHtml(w.englishWord)}')">삭제</button>
          </div>
        </td>
      </tr>`).join('');
    $('wTableWrap').innerHTML = `
      <table>
        <thead><tr><th>ID</th><th>단어</th><th>뜻</th><th>품사</th><th>레벨</th><th>스킬</th><th>예문</th><th>액션</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function openWordModal(id) {
    $('wordModalStatus').className = 'status';
    if (id) {
      const w = wordCache.find(x => x.id === id);
      if (!w) return;
      $('wordModalTitle').textContent = '단어 수정';
      $('wEditId').value = w.id;
      $('wEnglish').value = w.englishWord;
      $('wKorean').value = w.koreanMeaning;
      $('wPos').value = w.partOfSpeech;
      $('wLevelInput').value = w.wordLevel;
      $('wExEn').value = w.exampleEn;
      $('wExKr').value = w.exampleKr;
    } else {
      $('wordModalTitle').textContent = '단어 추가';
      ['wEditId','wEnglish','wKorean','wExEn','wExKr'].forEach(id => $(id).value = '');
      $('wPos').value = 'NOUN'; $('wLevelInput').value = 'INTERMEDIATE';
    }
    $('wordModal').classList.add('open');
  }
  function closeWordModal() { $('wordModal').classList.remove('open'); }

  async function saveWord() {
    const id = $('wEditId').value;
    const body = {
      englishWord: $('wEnglish').value.trim(),
      koreanMeaning: $('wKorean').value.trim(),
      partOfSpeech: $('wPos').value,
      wordLevel: $('wLevelInput').value,
      exampleEn: $('wExEn').value.trim() || null,
      exampleKr: $('wExKr').value.trim() || null,
    };
    if (!body.englishWord || !body.koreanMeaning) { showStatus('wordModalStatus','err','영어 단어와 한국어 뜻은 필수입니다.'); return; }
    try {
      await api(id ? 'PUT' : 'POST', id ? `/api/v1/admin/words/${id}` : '/api/v1/admin/words', body);
      showStatus('wordModalStatus','ok', id ? '수정 완료!' : '추가 완료!');
      await loadWords();
      setTimeout(closeWordModal, 800);
    } catch (e) { showStatus('wordModalStatus','err', e.message); }
  }

  async function deleteWord(id, name) {
    if (!confirm(`"${name}" 단어를 삭제하시겠습니까?\n연결된 스킬도 함께 삭제됩니다.`)) return;
    showStatus('wStatus','info','삭제 중...');
    try {
      await api('DELETE', `/api/v1/admin/words/${id}`);
      showStatus('wStatus','ok',`"${name}" 삭제 완료`);
      await loadWords();
    } catch (e) { showStatus('wStatus','err', e.message); }
  }

  // ── Skills ─────────────────────────────────────────────────
  let skillCache = [];
  let previewBase64s = [];
  let selectedPreviewIdx = -1;

  async function loadSkills() {
    hideStatus('sStatus');
    const wordId = $('sWordId').value.trim();
    let url = '/api/v1/admin/skills' + (wordId ? '?wordId=' + wordId : '');
    showStatus('sStatus','info','불러오는 중...');
    try {
      const data = await api('GET', url);
      skillCache = data?.data ?? [];
      renderSkillTable(skillCache);
      showStatus('sStatus','ok',`${skillCache.length}개 스킬`);
    } catch (e) { showStatus('sStatus','err', e.message); }
  }

  function renderSkillTable(skills) {
    if (!skills.length) { $('sTableWrap').innerHTML = '<div class="empty">스킬이 없습니다.</div>'; return; }
    const rows = skills.map(s => `
      <tr>
        <td class="mono dim">${s.id}</td>
        <td class="mono dim">${s.wordId}</td>
        <td style="color:#e0f0ff;font-weight:600;">${s.wordName}</td>
        <td>${s.name}</td>
        <td><span class="pill-sm">${s.skillType}</span></td>
        <td class="mono">${s.damage}</td>
        <td class="dim">${s.lasting ?? '-'}</td>
        <td>
          ${s.imageUrl
            ? `<img class="skill-thumb" src="${s.imageUrl}" onerror="this.style.display='none'" />`
            : `<div class="skill-thumb-none">없음</div>`}
        </td>
        <td>
          <div style="display:flex;gap:4px;">
            <button class="btn btn-sm warn" onclick="openSkillModal(${s.id})">수정</button>
            <button class="btn btn-sm danger" onclick="deleteSkill(${s.id},'${escHtml(s.name)}')">삭제</button>
          </div>
        </td>
      </tr>`).join('');
    $('sTableWrap').innerHTML = `
      <table>
        <thead><tr><th>ID</th><th>WordID</th><th>단어</th><th>스킬명</th><th>타입</th><th>데미지</th><th>지속</th><th>이미지</th><th>액션</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function openSkillModal(id) {
    $('skillModalStatus').className = 'status';
    $('imagePickerSection').style.display = 'none';
    $('imgOptions').innerHTML = '';
    $('btnConfirmImg').style.display = 'none';
    previewBase64s = []; selectedPreviewIdx = -1;

    const s = skillCache.find(x => x.id === id);
    if (!s) return;
    $('sEditId').value = s.id;
    $('sName').value = s.name;
    $('sDamage').value = s.damage;
    $('sExplanation').value = s.explanation;
    $('sType').value = s.skillType;
    $('sLasting').value = s.lasting ?? '';
    $('sCurrentImg').src = s.imageUrl || '';
    $('sCurrentImg').style.display = s.imageUrl ? 'block' : 'none';
    $('skillModal').classList.add('open');
  }
  function closeSkillModal() { $('skillModal').classList.remove('open'); }

  async function startImageRegen() {
    const id = $('sEditId').value;
    $('imagePickerSection').style.display = 'block';
    $('imgOptions').innerHTML = '';
    $('btnConfirmImg').style.display = 'none';
    $('imgGenStatus').textContent = '생성 중... (30~60초 소요)';
    $('btnPreviewImages').disabled = true;
    previewBase64s = []; selectedPreviewIdx = -1;

    try {
      const data = await api('POST', `/api/v1/admin/skills/${id}/preview-images`);
      previewBase64s = data?.data ?? [];
      $('imgGenStatus').textContent = '이미지를 선택하세요.';
      $('imgOptions').innerHTML = previewBase64s.map((b64, i) => `
        <div class="img-option" id="imgOpt${i}" onclick="selectPreview(${i})">
          <img src="data:image/png;base64,${b64}" />
          <div class="img-label">이미지 ${i + 1}</div>
        </div>`).join('');
      $('btnConfirmImg').style.display = 'block';
    } catch (e) {
      $('imgGenStatus').textContent = '생성 실패: ' + e.message;
    } finally {
      $('btnPreviewImages').disabled = false;
    }
  }

  function selectPreview(idx) {
    selectedPreviewIdx = idx;
    document.querySelectorAll('.img-option').forEach((el, i) => {
      el.classList.toggle('selected', i === idx);
    });
  }

  async function confirmImageSelection() {
    if (selectedPreviewIdx < 0) { alert('이미지를 선택해주세요.'); return; }
    const id = $('sEditId').value;
    const base64 = previewBase64s[selectedPreviewIdx];
    $('imgGenStatus').textContent = 'S3 업로드 중...';
    try {
      const data = await api('POST', `/api/v1/admin/skills/${id}/confirm-image`, { base64 });
      const updated = data?.data;
      if (updated?.imageUrl) {
        $('sCurrentImg').src = updated.imageUrl;
        $('sCurrentImg').style.display = 'block';
      }
      $('imgGenStatus').textContent = '저장 완료!';
      $('imagePickerSection').style.display = 'none';
      await loadSkills();
    } catch (e) {
      $('imgGenStatus').textContent = '저장 실패: ' + e.message;
    }
  }

  async function saveSkill() {
    const id = $('sEditId').value;
    const lastingVal = $('sLasting').value.trim();
    const body = {
      name: $('sName').value.trim() || null,
      explanation: $('sExplanation').value.trim() || null,
      damage: $('sDamage').value !== '' ? parseInt($('sDamage').value, 10) : null,
      skillType: $('sType').value || null,
      lasting: lastingVal !== '' ? parseInt(lastingVal, 10) : null,
    };
    try {
      await api('PUT', `/api/v1/admin/skills/${id}`, body);
      showStatus('skillModalStatus','ok','수정 완료!');
      await loadSkills();
      setTimeout(closeSkillModal, 800);
    } catch (e) { showStatus('skillModalStatus','err', e.message); }
  }

  async function deleteSkill(id, name) {
    if (!confirm(`"${name}" 스킬을 삭제하시겠습니까?`)) return;
    showStatus('sStatus','info','삭제 중...');
    try {
      await api('DELETE', `/api/v1/admin/skills/${id}`);
      showStatus('sStatus','ok',`"${name}" 삭제 완료`);
      await loadSkills();
    } catch (e) { showStatus('sStatus','err', e.message); }
  }

  // ── Users ──────────────────────────────────────────────────
  let userCache = [];

  async function loadUsers() {
    hideStatus('uStatus');
    showStatus('uStatus','info','불러오는 중...');
    try {
      const data = await api('GET', '/api/v1/admin/users');
      userCache = data?.data ?? [];
      renderUserTable(userCache);
      showStatus('uStatus','ok',`${userCache.length}명`);
    } catch (e) { showStatus('uStatus','err', e.message); }
  }

  function renderUserTable(users) {
    if (!users.length) { $('uTableWrap').innerHTML = '<div class="empty">유저가 없습니다.</div>'; return; }
    const rows = users.map(u => `
      <tr>
        <td class="mono dim">${u.id}</td>
        <td style="font-weight:600;">${u.nickname}</td>
        <td class="dim">${u.email}</td>
        <td class="mono">${u.expPoint}</td>
        <td class="dim" style="font-size:11px;">${u.createdAt?.substring(0,10) ?? '-'}</td>
        <td>${u.isDummy ? '<span class="pill-sm">더미</span>' : ''}</td>
        <td>
          <div style="display:flex;gap:4px;">
            <button class="btn btn-sm warn" onclick="openUserModal(${u.id})">수정</button>
            <button class="btn btn-sm danger" onclick="deleteUser(${u.id},'${escHtml(u.nickname)}')">삭제</button>
          </div>
        </td>
      </tr>`).join('');
    $('uTableWrap').innerHTML = `
      <table>
        <thead><tr><th>ID</th><th>닉네임</th><th>이메일</th><th>EXP</th><th>가입일</th><th>더미</th><th>액션</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function openUserModal(id) {
    $('userModalStatus').className = 'status';
    const u = userCache.find(x => x.id === id);
    if (!u) return;
    $('uEditId').value = u.id;
    $('uEmail').value = u.email;
    $('uNickname').value = u.nickname;
    $('uExpPoint').value = u.expPoint;
    $('userModal').classList.add('open');
  }
  function closeUserModal() { $('userModal').classList.remove('open'); }

  async function saveUser() {
    const id = $('uEditId').value;
    const body = {
      nickname: $('uNickname').value.trim() || null,
      expPoint: $('uExpPoint').value !== '' ? parseInt($('uExpPoint').value, 10) : null,
    };
    try {
      await api('PUT', `/api/v1/admin/users/${id}`, body);
      showStatus('userModalStatus','ok','수정 완료!');
      await loadUsers();
      setTimeout(closeUserModal, 800);
    } catch (e) { showStatus('userModalStatus','err', e.message); }
  }

  async function deleteUser(id, name) {
    if (!confirm(`"${name}" 유저를 삭제하시겠습니까?\n관련 데이터가 모두 삭제됩니다.`)) return;
    showStatus('uStatus','info','삭제 중...');
    try {
      await api('DELETE', `/api/v1/admin/users/${id}`);
      showStatus('uStatus','ok',`"${name}" 삭제 완료`);
      await loadUsers();
    } catch (e) { showStatus('uStatus','err', e.message); }
  }

  // ── Utils ──────────────────────────────────────────────────
  function escHtml(s) { return String(s).replace(/'/g, "\\'"); }

  // Close modals on background click
  ['wordModal','skillModal','userModal'].forEach(id => {
    $(id).addEventListener('click', e => { if (e.target === $(id)) $(id).classList.remove('open'); });
  });
</script>
</body>
</html>
