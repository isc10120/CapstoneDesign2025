name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'demo/**'
      - '.github/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v2

      # 2. Docker 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

  deploy-on-ec2:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      # 1. 코드 체크아웃 (docker-compose.yml 필요)
      - name: Checkout code
        uses: actions/checkout@v2

      # 2. SSH 설정
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      # 3. docker-compose.yml을 EC2로 복사
      - name: Copy docker-compose to EC2
        run: |
          scp -o StrictHostKeyChecking=no demo/docker-compose.prod.yml ${{ secrets.EC2_URL }}:~/docker-compose.yml

      # 4. EC2에서 Docker Compose 실행
      - name: Deploy with Docker Compose on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_URL }} << 'EOF'

            sudo docker-compose down
            sudo docker stop $(docker ps -q)
            sudo docker rm $(docker ps -a -q)
            sudo docker system prune -af

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest

            export AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}'
            export AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}'
            export OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}'
            export DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
            export JWT_SECRET='${{ secrets.JWT_SECRET }}'
            export ADMIN_SECRET='${{ secrets.ADMIN_SECRET }}'
            export DOCKER_USERNAME='${{ secrets.DOCKER_USERNAME }}'

            sudo -E docker-compose up -d
          EOF

